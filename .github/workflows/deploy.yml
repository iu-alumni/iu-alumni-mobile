name: Mobile CI/CD

# Flutter native app — WebView shell for the IU Alumni web app.
# The Docker web deployment has moved to iu-alumni-bot (Nuxt web app).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build Android APK
        run: flutter build apk --release \
          --dart-define=MOBILE_URL=https://mobile.alumap.escalopa.com

