name: Mobile CI/CD

# Triggers the centralized Mobile CI/CD workflow in iu-alumni-infra.
# All build and deploy logic lives in:
#   iu-alumni/iu-alumni-infra/.github/workflows/mobile.yml

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [testing, production]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to infra mobile workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: iu-alumni/iu-alumni-infra
          event-type: mobile-deploy
          client-payload: |
            {
              "environment": "${{ github.event_name == 'pull_request' && 'testing' || inputs.environment || 'production' }}",
              "ref": "${{ github.sha }}"
            }
