server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Prevent browsers and service workers from caching the entry point
    # and service worker script so deploys take effect immediately.
    location ~* ^/(index\.html|flutter_service_worker\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Static assets can be cached long-term (Flutter uses content hashes).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
