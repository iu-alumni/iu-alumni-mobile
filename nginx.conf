server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html or the Flutter service worker —
    # stale copies break app initialization after a new deploy.
    location ~* ^/(index\.html|flutter_service_worker\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
        try_files $uri =404;
    }

    # Flutter web SPA: serve index.html for any unknown path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
