plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.innopolis.alumni"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.innopolis.alumni"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            // Read from environment variables so the keystore is never committed.
            // Set these before building (see build-apk.sh for details):
            //   KEYSTORE_PATH   – absolute path to the .jks / .keystore file
            //   KEYSTORE_PASS   – keystore password
            //   KEY_ALIAS       – key alias inside the keystore
            //   KEY_PASS        – key password (often same as KEYSTORE_PASS)
            storeFile     = file(System.getenv("KEYSTORE_PATH") ?: "keystore-release.jks")
            storePassword = System.getenv("KEYSTORE_PASS") ?: ""
            keyAlias      = System.getenv("KEY_ALIAS")     ?: "upload"
            keyPassword   = System.getenv("KEY_PASS")      ?: ""
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
            minifyEnabled = false
        }
        debug {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

configurations {
   all*.exclude group: 'com.yandex.android', module: 'mobmetricalib-identifiers'
}
