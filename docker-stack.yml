version: "3.8"

# ─────────────────────────────────────────────────────────────
# IU Alumni Mobile - Production Docker Swarm stack (Flutter web)
#
# API_BASE_URL is injected at container start: the nginx entrypoint replaces the
# __API_BASE_URL__ placeholder in index.html with https://api.DOMAIN from .env.
#
# Deploy:
#   docker stack deploy -c docker-stack.yml iu_alumni_mobile --with-registry-auth
#
# Requires the shared overlay network:
#   docker network create --driver overlay --attachable iu_alumni_network
# ─────────────────────────────────────────────────────────────

services:
  mobile:
    image: ${MOBILE_IMAGE}
    environment:
      # Derived from DOMAIN in DEPLOY_DIR/.env at deploy time.
      # The entrypoint replaces __API_BASE_URL__ in index.html with this value.
      - API_BASE_URL=https://api.${DOMAIN}
    networks:
      iu_alumni_network:
        aliases:
          - mobile
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

networks:
  iu_alumni_network:
    external: true
